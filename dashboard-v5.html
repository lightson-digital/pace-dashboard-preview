<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Kahala Hotel & Resort — Pace Report</title>
<style>
:root {
  --lod-black: #000000;
  --lod-near-black: #1A1A1A;
  --lod-white: #FFFFFF;
  --lod-electric-blue: #0A84FF;
  --pos: #167D48;
  --neg: #d63b3b;
  --watch: #d97706;
  --ghost: #C0C0C0;
  --lod-light-gray: #E5E5E5;
  --lod-gray-light: #F5F5F5;
  --lod-gray-mid: #E5E5E5;
  --lod-gray-dark: #666666;
  --font-main: 'Inter', 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-main);
  color: var(--lod-near-black);
  background: var(--lod-white);
  line-height: 1.5;
  padding: 32px 40px;
  max-width: 1200px;
  margin: 0 auto;
}

/* ── 1. Report Header ───────────────────────────────────── */
.report-header {
  background: var(--lod-black);
  color: var(--lod-white);
  padding: 28px 32px;
  margin: -32px -40px 32px -40px;
}

.report-header h1 {
  font-size: 36px;
  font-weight: 300;
  letter-spacing: -0.75px;
  color: var(--lod-white);
}

.report-header .subtitle {
  display: flex;
  gap: 20px;
  align-items: center;
  margin-top: 4px;
  font-size: 14px;
  color: rgba(255,255,255,0.7);
}

.report-header .subtitle span {
  display: inline-flex;
  align-items: center;
}

.report-header .subtitle span::before {
  content: '';
  display: inline-block;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
  margin-right: 10px;
}

.report-header .subtitle span:first-child::before { display: none; }
.report-header .subtitle span:empty::before { display: none; }

/* ── 2. Browser Controls ────────────────────────────────── */
.controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 24px;
}

.pill-group {
  display: flex;
  gap: 8px;
}

.pill-group label {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--lod-gray-dark);
  margin-right: 10px;
  align-self: center;
}

.pill {
  padding: 8px 16px;
  border: 1px solid var(--lod-gray-mid);
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.02em;
  cursor: pointer;
  background: var(--lod-white);
  color: var(--lod-near-black);
  transition: all 0.15s ease;
  user-select: none;
}

.pill:hover:not(.disabled):not(.active) {
  background: var(--lod-gray-light);
}

.pill.active {
  background: var(--lod-black);
  color: var(--lod-white);
  border-color: var(--lod-black);
}

.pill.disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

.pill.disabled[title] {
  position: relative;
}

.ooo-toggle {
  display: flex;
  border: 1px solid var(--lod-gray-mid);
  border-radius: 20px;
  overflow: hidden;
}

.ooo-toggle .pill {
  border: none;
  border-radius: 0;
}

.ooo-toggle .pill.active {
  background: var(--lod-black);
  color: var(--lod-white);
}

/* ── 3. KPI Banner ──────────────────────────────────────── */
.kpi-banner {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-bottom: 36px;
}

.kpi-card {
  background: var(--lod-gray-light);
  border-radius: 10px;
  padding: 24px 20px;
}

.kpi-card .kpi-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--lod-gray-dark);
  margin-bottom: 6px;
}

.kpi-card .kpi-current {
  font-size: 36px;
  font-weight: 700;
  letter-spacing: -1px;
  line-height: 1.1;
}

.kpi-card .kpi-comparison {
  font-size: 13px;
  color: var(--lod-gray-dark);
  margin-top: 4px;
}

.kpi-card .kpi-delta {
  display: flex;
  gap: 8px;
  margin-top: 6px;
  font-size: 13px;
  font-weight: 600;
}

.delta-positive { color: var(--pos); }
.delta-negative { color: var(--neg); }
.delta-neutral  { color: var(--lod-gray-dark); }

.kpi-no-comparison {
  text-align: center;
  padding: 24px;
  color: var(--lod-gray-dark);
  font-size: 14px;
  grid-column: 1 / -1;
  background: var(--lod-gray-light);
  border-radius: 10px;
}

/* ── 4. Hero Pacing Chart ───────────────────────────────── */
.chart-section {
  margin-bottom: 36px;
}

.chart-section .section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.chart-section .section-header h2 {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--lod-gray-dark);
}

.chart-filter .pill {
  padding: 8px 14px;
  font-size: 12px;
}

#hero-chart {
  width: 100%;
  overflow-x: auto;
}

#hero-chart svg {
  display: block;
  max-width: 100%;
}

.chart-legend {
  display: flex;
  gap: 20px;
  margin-top: 8px;
  margin-left: 80px;
  font-size: 12px;
  color: var(--lod-gray-dark);
}

.chart-legend span {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.legend-swatch {
  display: inline-block;
  width: 14px;
  height: 10px;
  border-radius: 2px;
}

.legend-swatch.current { background: var(--lod-electric-blue); }
.legend-swatch.comparison { background: none; border: 1.5px solid var(--ghost); }
.legend-swatch.adr { background: none; width: 14px; height: 0; border-radius: 0; border-bottom: 2px dashed var(--lod-electric-blue); }

/* ── 5. Monthly Breakdown Table ─────────────────────────── */
.table-section {
  margin-bottom: 16px;
}

.table-section h2 {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--lod-gray-dark);
  margin-bottom: 12px;
}

.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.data-table th {
  text-align: right;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--lod-gray-dark);
  border-bottom: 2px solid var(--lod-black);
  white-space: nowrap;
  padding: 10px 12px;
}

.data-table th:first-child { text-align: left; }

.data-table td {
  text-align: right;
  padding: 10px 12px;
  border-bottom: 1px solid var(--lod-gray-mid);
  white-space: nowrap;
}

.data-table td:first-child {
  text-align: left;
  font-weight: 600;
  cursor: pointer;
}

.data-table td:first-child:hover {
  color: var(--lod-electric-blue);
}

.data-table tr:hover:not(.day-expand-row) {
  background: var(--lod-gray-light);
}
.day-expand-row.visible:hover td {
  background: #EBEBEB;
}
.day-expand-row.visible:hover td.rev-vs-pos {
  background: #a8ddb8;
}
.day-expand-row.visible:hover td.rev-vs-neg {
  background: #eba0a0;
}

.data-table .col-group-current {}
.data-table .col-group-delta { color: var(--lod-gray-dark); }
.data-table .col-group-pickup { color: var(--lod-gray-dark); }

.data-table .th-group {
  text-align: center;
  border-bottom: 1px solid var(--lod-gray-mid);
  font-size: 10px;
  padding: 4px 10px;
  color: var(--lod-gray-dark);
}

/* Column group separators — class-based (used on both th and td) */
.col-sep {
  border-left: 2px solid var(--lod-gray-mid);
}

/* Revenue-vs cell color highlight */
.rev-vs-pos {
  background: #b8e8c8;
}
.rev-vs-neg {
  background: #f5b0b0;
}
/* Daily rows: higher specificity needed to override .day-expand-row td */
.day-expand-row td.rev-vs-pos {
  background: #b8e8c8;
}
.day-expand-row td.rev-vs-neg {
  background: #f5b0b0;
}
.day-expand-row td.delta-positive {
  color: var(--pos);
}
.day-expand-row td.delta-negative {
  color: var(--neg);
}

/* Chart tooltip */
.chart-tooltip-box {
  position: fixed;
  z-index: 100;
  background: rgba(26, 26, 26, 0.95);
  color: var(--lod-white);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 12px;
  pointer-events: none;
  line-height: 1.7;
  min-width: 160px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.chart-tooltip-box .tt-label {
  font-weight: 600;
  margin-bottom: 2px;
  font-size: 13px;
}

/* ── Expand Icon ───────────────────────────────────────── */
.expand-icon {
  display: inline-block;
  transition: transform 0.15s ease;
  margin-right: 6px;
  font-size: 10px;
  color: var(--lod-gray-dark);
}
.month-expanded .expand-icon {
  transform: rotate(90deg);
}

/* ── 6. Daily Breakdown (Expandable) ────────────────────── */
.day-expand-row {
  display: none;
}

.day-expand-row.visible {
  display: table-row;
}

.day-expand-row td {
  font-size: 12px;
  color: var(--lod-gray-dark);
  background: var(--lod-gray-light);
  padding: 6px 10px;
}

.day-expand-row td:first-child {
  padding-left: 28px;
  font-weight: 400;
  cursor: default;
  border-left: 3px solid var(--lod-electric-blue);
}

.day-expand-row td:first-child:hover {
  color: inherit;
}

.day-placeholder {
  text-align: center !important;
  font-style: italic;
  color: var(--lod-gray-dark);
}

/* ── 7. Footnotes ───────────────────────────────────────── */
.footnotes {
  font-size: 12px;
  color: var(--lod-gray-dark);
  border-top: 1px solid var(--lod-gray-mid);
  padding-top: 12px;
  margin-bottom: 32px;
}

.footnotes p {
  margin-bottom: 4px;
}

/* ── 8. Footer ──────────────────────────────────────────── */
.report-footer {
  background: var(--lod-black);
  color: rgba(255,255,255,0.7);
  padding: 20px 32px;
  margin: 0 -40px -32px -40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  letter-spacing: 0.01em;
}

/* ── Focus Visible ──────────────────────────────────────── */
.pill:focus-visible {
  outline: 2px solid var(--lod-electric-blue);
  outline-offset: 2px;
}
.pill:active:not(.disabled) {
  transform: scale(0.97);
}
.data-table tr { transition: background 0.1s ease; }

/* ── Print ──────────────────────────────────────────────── */
@media print {
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  @page { size: letter; margin: 0.45in 0.35in; }
  body { padding: 16px 20px; }
  .report-header { margin: -16px -20px 28px -20px; }
  .report-footer { margin: 0 -20px -16px -20px; }
  .controls, .chart-filter, .day-expand-row { display: none !important; }
  .expand-icon { display: none; }
  .kpi-card { break-inside: avoid; }
  .kpi-banner { break-inside: avoid; }
  .chart-section { break-inside: avoid; }
  .data-table tr { break-inside: avoid; }
  .footnotes, .report-footer { break-before: avoid; }
  .data-table td:first-child { cursor: default; }
  .data-table td:first-child:hover { color: inherit; }
}
</style>
</head>

/* ── Format helpers ─────────────────────────────────────── */
function fmtMoney(val) {
  if (val === null || val === undefined) return '\u2014';
  return '$' + Math.round(val).toLocaleString('en-US');
}

function fmtPickupAdr(pickup) {
  if (!pickup || pickup.adr === null || pickup.adr === undefined) return '\u2014';
  if ((pickup.rooms > 0 && pickup.revenue < 0) || (pickup.rooms < 0 && pickup.revenue > 0)) {
    return '\u2014';
  }
  return fmtMoney(pickup.adr);
}

function fmtNum(val) {
  if (val === null || val === undefined) return '\u2014';
  return Math.round(val).toLocaleString('en-US');
}

function fmtPct(val) {
  if (val === null || val === undefined) return '\u2014';
  return val.toFixed(1) + '%';
}

function deltaArrow(val) {
  if (val === null || val === undefined || val === 0) return '';
  return val > 0 ? '\u25B2\u2009' : '\u25BC\u2009';
}

function fmtDeltaMoney(val) {
  if (val === null || val === undefined) return '\u2014';
  var arrow = deltaArrow(val);
  if (val > 0) return arrow + '+$' + Math.round(val).toLocaleString('en-US');
  return arrow + '\u2212$' + Math.round(Math.abs(val)).toLocaleString('en-US');
}

function fmtDeltaNum(val) {
  if (val === null || val === undefined) return '\u2014';
  var arrow = deltaArrow(val);
  if (val > 0) return arrow + '+' + Math.round(val).toLocaleString('en-US');
  if (val < 0) return arrow + '\u2212' + Math.round(Math.abs(val)).toLocaleString('en-US');
  return '0';
}

function fmtDeltaPct(val) {
  if (val === null || val === undefined) return '\u2014';
  var arrow = deltaArrow(val);
  if (val > 0) return arrow + '+' + val.toFixed(1) + '%';
  if (val < 0) return arrow + '\u2212' + Math.abs(val).toFixed(1) + '%';
  return '0.0%';
}

function fmtDeltaPP(val) {
  if (val === null || val === undefined) return '\u2014';
  var arrow = deltaArrow(val);
  if (val > 0) return arrow + '+' + val.toFixed(1) + ' pp';
  if (val < 0) return arrow + '\u2212' + Math.abs(val).toFixed(1) + ' pp';
  return '0.0 pp';
}

function deltaClass(val) {
  if (val === null || val === undefined || val === 0) return 'delta-neutral';
  return val > 0 ? 'delta-positive' : 'delta-negative';
}

/* ── Window label ───────────────────────────────────────── */
function buildWindowLabel() {
  var data = getActiveData();
  if (!data.monthly || data.monthly.length === 0) return '';
  var first = data.monthly[0].label;
  var last = data.monthly[data.monthly.length - 1].label;
  return first + ' \u2013 ' + last;
}

/* ── KPI Banner ─────────────────────────────────────────── */

function aggregateKpiFromMonthly(monthly) {
  /* Re-aggregate KPI values from a slice of monthly data.
     This lets the KPI banner respond to the time filter. */
  var totalRooms = 0, totalRevenue = 0;
  var compRooms = 0, compRevenue = 0, hasComp = false;
  var denomExcl = 0, denomIncl = 0;
  var compDenomExcl = 0, compDenomIncl = 0;
  var occExclKey = 'occ_excl_ooo', occInclKey = 'occ_incl_ooo';

  for (var i = 0; i < monthly.length; i++) {
    var m = monthly[i];
    var cur = m.current;
    totalRooms += cur.rooms;
    totalRevenue += cur.revenue;
    if (cur[occExclKey] !== null) {
      denomExcl += cur.available_room_nights - cur.ooo_room_nights;
    }
    if (cur[occInclKey] !== null) {
      denomIncl += cur.available_room_nights;
    }
    if (m.comparison) {
      hasComp = true;
      compRooms += m.comparison.rooms;
      compRevenue += m.comparison.revenue;
      if (m.comparison[occExclKey] !== null) {
        compDenomExcl += m.comparison.available_room_nights - m.comparison.ooo_room_nights;
      }
      if (m.comparison[occInclKey] !== null) {
        compDenomIncl += m.comparison.available_room_nights;
      }
    }
  }

  function safeDiv(num, den) { return den > 0 ? num / den : null; }
  function safeDelta(a, b) {
    if (a === null || b === null) return {delta: null, delta_pct: null};
    var d = a - b;
    var pct = b !== 0 ? d / b * 100 : null;
    return {delta: Math.round(d * 100) / 100, delta_pct: pct !== null ? Math.round(pct * 100) / 100 : null};
  }

  var curRev = totalRevenue;
  var curAdr = safeDiv(totalRevenue, totalRooms);
  var curOccExcl = denomExcl > 0 ? totalRooms / denomExcl * 100 : null;
  var curOccIncl = denomIncl > 0 ? totalRooms / denomIncl * 100 : null;
  var curRpExcl = safeDiv(totalRevenue, denomExcl);
  var curRpIncl = safeDiv(totalRevenue, denomIncl);

  var cRev = hasComp ? compRevenue : null;
  var cAdr = hasComp ? safeDiv(compRevenue, compRooms) : null;
  var cOccExcl = hasComp && compDenomExcl > 0 ? compRooms / compDenomExcl * 100 : null;
  var cOccIncl = hasComp && compDenomIncl > 0 ? compRooms / compDenomIncl * 100 : null;
  var cRpExcl = hasComp ? safeDiv(compRevenue, compDenomExcl) : null;
  var cRpIncl = hasComp ? safeDiv(compRevenue, compDenomIncl) : null;

  return {
    revenue: {current: curRev, comparison: cRev, delta: safeDelta(curRev, cRev).delta, delta_pct: safeDelta(curRev, cRev).delta_pct},
    adr: {current: curAdr, comparison: cAdr, delta: safeDelta(curAdr, cAdr).delta, delta_pct: safeDelta(curAdr, cAdr).delta_pct},
    occupancy_excl_ooo: {current: curOccExcl, comparison: cOccExcl, delta: safeDelta(curOccExcl, cOccExcl).delta, delta_pct: safeDelta(curOccExcl, cOccExcl).delta_pct},
    occupancy_incl_ooo: {current: curOccIncl, comparison: cOccIncl, delta: safeDelta(curOccIncl, cOccIncl).delta, delta_pct: safeDelta(curOccIncl, cOccIncl).delta_pct},
    revpar_excl_ooo: {current: curRpExcl, comparison: cRpExcl, delta: safeDelta(curRpExcl, cRpExcl).delta, delta_pct: safeDelta(curRpExcl, cRpExcl).delta_pct},
    revpar_incl_ooo: {current: curRpIncl, comparison: cRpIncl, delta: safeDelta(curRpIncl, cRpIncl).delta, delta_pct: safeDelta(curRpIncl, cRpIncl).delta_pct}
  };
}

function renderKpiBanner(kpi) {
  var el = document.getElementById('kpi-banner');

  var occKey = activeOoo === 'excl' ? 'occupancy_excl_ooo' : 'occupancy_incl_ooo';
  var rpKey = activeOoo === 'excl' ? 'revpar_excl_ooo' : 'revpar_incl_ooo';

  el.innerHTML =
    kpiCard('Revenue', fmtMoney(kpi.revenue.current), fmtMoney(kpi.revenue.comparison), fmtDeltaMoney(kpi.revenue.delta), kpi.revenue.delta_pct) +
    kpiCard('ADR', fmtMoney(kpi.adr.current), fmtMoney(kpi.adr.comparison), fmtDeltaMoney(kpi.adr.delta), kpi.adr.delta_pct) +
    kpiCard('Occupancy', fmtPct(kpi[occKey].current), fmtPct(kpi[occKey].comparison), fmtDeltaPP(kpi[occKey].delta), kpi[occKey].delta_pct) +
    kpiCard('RevPAR', fmtMoney(kpi[rpKey].current), fmtMoney(kpi[rpKey].comparison), fmtDeltaMoney(kpi[rpKey].delta), kpi[rpKey].delta_pct);
}

function kpiCard(label, current, comparison, delta, deltaPct) {
  var deltaPctStr = fmtDeltaPct(deltaPct);
  var cls = deltaClass(deltaPct);
  var compLine = comparison !== null
    ? '<div class="kpi-comparison">vs ' + comparison + '</div>'
    : '<div class="kpi-comparison">\u2014</div>';
  var deltaLine = (delta !== null)
    ? '<div class="kpi-delta"><span class="' + cls + '">' + delta + '</span><span class="' + cls + '">' + deltaPctStr + '</span></div>'
    : '<div class="kpi-delta"><span class="delta-neutral">\u2014</span></div>';
  return '<div class="kpi-card">' +
    '<div class="kpi-label">' + label + '</div>' +
    '<div class="kpi-current">' + current + '</div>' +
    compLine + deltaLine + '</div>';
}

/* ── Monthly Breakdown Table ────────────────────────────── */
function renderMonthlyTable(monthly) {

  var html = '';
  var hasComparison = activeMode && DATA.modes[activeMode];
  var occCurrentKey = activeOoo === 'excl' ? 'occ_excl_ooo' : 'occ_incl_ooo';
  var rpCurrentKey = activeOoo === 'excl' ? 'revpar_excl_ooo' : 'revpar_incl_ooo';
  var occDeltaKey = activeOoo === 'excl' ? 'occ_excl_ooo_pp' : 'occ_incl_ooo_pp';
  var dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

  for (var i = 0; i < monthly.length; i++) {
    var m = monthly[i];
    var cur = m.current || {};
    var delta = m.delta;
    var pickup = m.pickup;
    var monthKey = m.month;

    /* Revenue-vs cell color */
    var revVsExtra = '';
    if (delta && hasComparison) {
      revVsExtra = delta.revenue > 0 ? ' rev-vs-pos' : delta.revenue < 0 ? ' rev-vs-neg' : '';
    }

    html += '<tr class="month-row" data-month-key="' + monthKey + '" onclick="toggleDay(\'' + monthKey + '\')">';
    html += '<td><span class="expand-icon">\u25B8</span>' + m.label + '</td>';
    html += '<td>' + fmtNum(cur.rooms) + '</td>';

    /* Revenue OTB | Revenue vs */
    html += '<td class="col-sep">' + fmtMoney(cur.revenue) + '</td>';
    if (delta && hasComparison) {
      html += '<td class="' + deltaClass(delta.revenue) + revVsExtra + '">' + fmtDeltaMoney(delta.revenue) + '</td>';
    } else {
      html += '<td>\u2014</td>';
    }

    /* ADR OTB | ADR vs */
    html += '<td class="col-sep">' + fmtMoney(cur.adr) + '</td>';
    if (delta && hasComparison) {
      html += '<td class="' + deltaClass(delta.adr) + '">' + fmtDeltaMoney(delta.adr) + '</td>';
    } else {
      html += '<td>\u2014</td>';
    }

    /* Occ% OTB | Occ vs */
    html += '<td class="col-sep">' + fmtPct(cur[occCurrentKey]) + '</td>';
    if (delta && hasComparison) {
      html += '<td class="' + deltaClass(delta[occDeltaKey]) + '">' + fmtDeltaPP(delta[occDeltaKey]) + '</td>';
    } else {
      html += '<td>\u2014</td>';
    }

    /* RevPAR */
    html += '<td class="col-sep">' + fmtMoney(cur[rpCurrentKey]) + '</td>';

    /* Pickup */
    if (pickup) {
      html += '<td class="col-sep">' + fmtNum(pickup.rooms) + '</td>';
      html += '<td>' + fmtMoney(pickup.revenue) + '</td>';
      html += '<td>' + fmtPickupAdr(pickup) + '</td>';
    } else {
      html += '<td class="col-sep">\u2014</td><td>\u2014</td><td>\u2014</td>';
    }

    html += '</tr>';

    /* Daily expansion rows */
    var dailyData = getActiveData().daily;
    var days = dailyData ? dailyData[monthKey] : null;
    if (days && days.length > 0) {
      for (var d = 0; d < days.length; d++) {
        var day = days[d];
        var dayCur = day.current || {};
        var dayDelta = day.delta;
        var dayPickup = day.pickup;

        /* Format date as "Dow Mon D" e.g. "Sat Mar 1" */
        var dateParts = day.date.split('-');
        var dateObj = new Date(parseInt(dateParts[0]), parseInt(dateParts[1]) - 1, parseInt(dateParts[2]));
        var dayLabel = dayNames[dateObj.getDay()] + ' ' + dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

        var dayRevVsExtra = '';
        if (dayDelta && hasComparison) {
          dayRevVsExtra = dayDelta.revenue > 0 ? ' rev-vs-pos' : dayDelta.revenue < 0 ? ' rev-vs-neg' : '';
        }

        /* Approximate daily occ delta: comparison.rooms / total_rooms as proxy for comparison occ% */
        var dayOccDelta = null;
        var dayComp = day.comparison;
        var totalRooms = DATA.hotel.total_rooms;
        if (dayComp && dayComp.rooms != null && totalRooms > 0 && dayCur[occCurrentKey] != null && hasComparison) {
          var compOccApprox = dayComp.rooms / totalRooms * 100;
          dayOccDelta = dayCur[occCurrentKey] - compOccApprox;
        }

        html += '<tr class="day-expand-row" data-month="' + monthKey + '">';
        html += '<td>' + dayLabel + '</td>';
        html += '<td>' + fmtNum(dayCur.rooms) + '</td>';

        /* Revenue OTB | Revenue vs */
        html += '<td class="col-sep">' + fmtMoney(dayCur.revenue) + '</td>';
        if (dayDelta && hasComparison) {
          html += '<td class="' + deltaClass(dayDelta.revenue) + dayRevVsExtra + '">' + fmtDeltaMoney(dayDelta.revenue) + '</td>';
        } else {
          html += '<td>\u2014</td>';
        }

        /* ADR OTB | ADR vs */
        html += '<td class="col-sep">' + fmtMoney(dayCur.adr) + '</td>';
        if (dayDelta && hasComparison) {
          html += '<td class="' + deltaClass(dayDelta.adr) + '">' + fmtDeltaMoney(dayDelta.adr) + '</td>';
        } else {
          html += '<td>\u2014</td>';
        }

        /* Occ% OTB | Occ vs (delta approx: current occ − comparison.rooms/total_rooms) */
        html += '<td class="col-sep">' + fmtPct(dayCur[occCurrentKey]) + '</td>';
        if (dayOccDelta !== null) {
          html += '<td class="' + deltaClass(dayOccDelta) + '">' + fmtDeltaPP(dayOccDelta) + '</td>';
        } else {
          html += '<td>\u2014</td>';
        }

        /* RevPAR */
        html += '<td class="col-sep">' + fmtMoney(dayCur[rpCurrentKey]) + '</td>';

        /* Pickup */
        if (dayPickup) {
          html += '<td class="col-sep">' + fmtNum(dayPickup.rooms) + '</td>';
          html += '<td>' + fmtMoney(dayPickup.revenue) + '</td>';
          html += '<td>' + fmtPickupAdr(dayPickup) + '</td>';
        } else {
          html += '<td class="col-sep">\u2014</td><td>\u2014</td><td>\u2014</td>';
        }

        html += '</tr>';
      }
    } else {
      html += '<tr class="day-expand-row" data-month="' + monthKey + '">';
      html += '<td colspan="12" class="day-placeholder">No daily data available</td>';
      html += '</tr>';
    }
  }

  tbody.innerHTML = html;
}

/* ── Weekly Aggregation from Daily Data ─────────────────── */
function aggregateWeekly(data, months) {
  /* Build weekly buckets from daily data within the given month count.
     Each week starts Monday (ISO convention). */
  var monthly = data.monthly || [];
  var daily = data.daily || {};
  var sliced = months < monthly.length ? monthly.slice(0, months) : monthly;

  /* Collect all days in the filtered months */
  var occKey = activeOoo === 'excl' ? 'occ_excl_ooo' : 'occ_incl_ooo';
  var allDays = [];
  for (var i = 0; i < sliced.length; i++) {
    var mk = sliced[i].month;
    var days = daily[mk] || [];
    for (var j = 0; j < days.length; j++) {
      allDays.push(days[j]);
    }
  }
  if (allDays.length === 0) {
    /* Fallback to monthly if no daily data */
    return sliced.map(function(m) {
      return {label: m.label, monthName: m.label.split(' ')[0], isFirstOfMonth: true,
              current: {revenue: m.current.revenue, adr: m.current.adr, occ: m.current[occKey] != null ? m.current[occKey] : null},
              comparison: m.comparison ? {revenue: m.comparison.revenue} : null};
    });
  }

  /* Sort by date */
  allDays.sort(function(a, b) { return a.date < b.date ? -1 : a.date > b.date ? 1 : 0; });

  /* Group into ISO weeks (Mon start) */
  var weeks = [];
  var curWeek = null;
  for (var d = 0; d < allDays.length; d++) {
    var day = allDays[d];
    var dt = new Date(day.date + 'T00:00:00');
    /* Get Monday of this week */
    var dow = dt.getDay(); /* 0=Sun */
    var mondayOffset = dow === 0 ? -6 : 1 - dow;
    var monday = new Date(dt);
    monday.setDate(dt.getDate() + mondayOffset);
    var weekKey = monday.toISOString().slice(0, 10);

    if (!curWeek || curWeek.key !== weekKey) {
      curWeek = {key: weekKey, monday: monday, curRooms: 0, curRevenue: 0, curRoomRev: 0,
                 compRevenue: 0, hasComp: false, occSum: 0, occCount: 0, days: 0};
      weeks.push(curWeek);
    }
    curWeek.curRooms += day.current.rooms;
    curWeek.curRevenue += day.current.revenue;
    curWeek.curRoomRev += day.current.revenue; /* room_revenue = revenue at daily level */
    curWeek.days++;
    if (day.current[occKey] != null) {
      curWeek.occSum += day.current[occKey];
      curWeek.occCount++;
    }
    if (day.comparison) {
      curWeek.compRevenue += day.comparison.revenue;
      curWeek.hasComp = true;
    }
  }

  /* Convert to chart-friendly format */
  var months_short = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var result = weeks.map(function(w) {
    var adr = w.curRooms > 0 ? w.curRoomRev / w.curRooms : null;
    var occ = w.occCount > 0 ? w.occSum / w.occCount : null;
    var mon = w.monday;
    var label = months_short[mon.getMonth()] + ' ' + mon.getDate();
    return {
      label: label,
      monthName: months_short[mon.getMonth()],
      monthNum: mon.getMonth(),
      isFirstOfMonth: false,
      current: {revenue: w.curRevenue, adr: adr, occ: occ},
      comparison: w.hasComp ? {revenue: w.compRevenue} : null
    };
  });
  /* Mark first occurrence of each month */
  var prevMonthNum = -1;
  for (var ri = 0; ri < result.length; ri++) {
    if (result[ri].monthNum !== prevMonthNum) {
      result[ri].isFirstOfMonth = true;
      prevMonthNum = result[ri].monthNum;
    }
  }
  return result;
}

/* ── Daily Chart Data (no aggregation) ─────────────────── */
function getDailyChartData(months) {
  var data = getActiveData();
  var monthly = data.monthly || [];
  var daily = data.daily || {};
  var sliced = months < monthly.length ? monthly.slice(0, months) : monthly;
  var months_short = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var occKey = activeOoo === 'excl' ? 'occ_excl_ooo' : 'occ_incl_ooo';
  var points = [];

  for (var i = 0; i < sliced.length; i++) {
    var mk = sliced[i].month;
    var days = daily[mk] || [];
    for (var j = 0; j < days.length; j++) {
      var day = days[j];
      var dateParts = day.date.split('-');
      var mo = parseInt(dateParts[1]) - 1;
      points.push({
        label: months_short[mo] + ' ' + parseInt(dateParts[2]),
        monthName: months_short[mo],
        isFirstOfMonth: j === 0,
        current: { revenue: day.current.revenue, adr: day.current.adr, occ: day.current[occKey] != null ? day.current[occKey] : null },
        comparison: day.comparison ? { revenue: day.comparison.revenue } : null
      });
    }
  }
  return points;
}

/* ── Hero Chart (Client-side SVG) ───────────────────────── */
function renderHeroChart(months) {
  var data = getActiveData();
  var sliced = months <= 3 ? getDailyChartData(months) : aggregateWeekly(data, months);
  if (sliced.length === 0) return;

  var currentRev = [], ghostRev = [], adrPoints = [];
  chartTooltipData = [];

  for (var i = 0; i < sliced.length; i++) {
    var m = sliced[i];
    var cur = m.current || {};
    currentRev.push(cur.revenue || 0);
    var comp = m.comparison;
    ghostRev.push((comp && comp.revenue != null) ? comp.revenue : null);
    adrPoints.push(cur.adr != null ? cur.adr : null);
    chartTooltipData.push({ label: m.label, currentRev: cur.revenue || 0, compRev: comp ? comp.revenue : null, currentAdr: cur.adr != null ? cur.adr : null, currentOcc: cur.occ != null ? cur.occ : null });
  }

  var n = sliced.length;

  /* Y-axis scales */
  var allRev = currentRev.filter(function(r) { return r > 0; });
  for (var j = 0; j < ghostRev.length; j++) {
    if (ghostRev[j] !== null && ghostRev[j] > 0) allRev.push(ghostRev[j]);
  }
  var maxRev = allRev.length > 0 ? Math.max.apply(null, allRev) * 1.15 : 1000000;

  var validAdr = adrPoints.filter(function(a) { return a !== null && a > 0; });
  var minAdr = validAdr.length > 0 ? Math.min.apply(null, validAdr) * 0.85 : 0;
  var maxAdr = validAdr.length > 0 ? Math.max.apply(null, validAdr) * 1.15 : 1000;

  /* Narrower bars for daily (large n) */
  var groupW = PLOT_W / n;
  var padFactor = n > 60 ? 0.28 : 0.3;
  var barW = groupW * padFactor;
  var gap = groupW * 0.03;

  function revY(val) {
    if (maxRev === 0) return PAD_T + PLOT_H;
    return PAD_T + PLOT_H - (val / maxRev) * PLOT_H;
  }
  function adrY(val) {
    if (maxAdr === minAdr) return PAD_T + PLOT_H / 2;
    return PAD_T + PLOT_H - (val - minAdr) / (maxAdr - minAdr) * PLOT_H;
  }
  function fmtRevAxis(val) {
    if (val >= 1000000) return '$' + (val / 1000000).toFixed(1) + 'M';
    if (val >= 1000) return '$' + Math.round(val / 1000) + 'K';
    return '$' + Math.round(val);
  }

  var svg = '<svg width="' + CHART_WIDTH + '" height="' + CHART_HEIGHT + '" xmlns="http://www.w3.org/2000/svg" style="font-family:Inter,DM Sans,Arial,sans-serif">';
  svg += '<rect width="' + CHART_WIDTH + '" height="' + CHART_HEIGHT + '" fill="white"/>';

  /* Horizontal revenue grid lines */
  for (var g = 0; g < 5; g++) {
    var gy = PAD_T + (PLOT_H / 4) * g;
    var gVal = maxRev - (maxRev / 4) * g;
    svg += '<line x1="' + PAD_L + '" y1="' + gy.toFixed(1) + '" x2="' + (CHART_WIDTH - PAD_R) + '" y2="' + gy.toFixed(1) + '" stroke="' + COL_GRID + '" stroke-width="0.5"/>';
    svg += '<text x="' + (PAD_L - 8) + '" y="' + (gy + 4).toFixed(1) + '" text-anchor="end" fill="' + COL_LABEL + '" font-size="11">' + fmtRevAxis(gVal) + '</text>';
  }

  /* Right axis — ADR */
  if (activeAdr) {
    for (var a = 0; a < 5; a++) {
      var ay = PAD_T + (PLOT_H / 4) * a;
      var aVal = maxAdr - (maxAdr - minAdr) / 4 * a;
      svg += '<text x="' + (CHART_WIDTH - PAD_R + 8) + '" y="' + (ay + 4).toFixed(1) + '" text-anchor="start" fill="' + COL_ADR + '" font-size="11">$' + Math.round(aVal) + '</text>';
    }
  }

  /* Month boundary vertical grid lines */
  for (var mb = 1; mb < n; mb++) {
    if (sliced[mb].isFirstOfMonth) {
      var mbX = (PAD_L + mb * groupW).toFixed(1);
      svg += '<line x1="' + mbX + '" y1="' + PAD_T + '" x2="' + mbX + '" y2="' + (PAD_T + PLOT_H) + '" stroke="' + COL_GRID + '" stroke-width="1" stroke-dasharray="3,3"/>';
    }
  }

  var baseY = revY(0);

  /* Bars + invisible hitboxes for tooltips */
  for (var b = 0; b < n; b++) {
    var gx = PAD_L + b * groupW;

    /* Bar color: green if ahead, red if behind, blue if no comparison */
    var barColor = COL_CURRENT;
    if (ghostRev[b] !== null) {
      barColor = currentRev[b] >= ghostRev[b] ? '#167D48' : '#d63b3b';
    }

    if (ghostRev[b] !== null && ghostRev[b] > 0) {
      var gbTop = revY(ghostRev[b]);
      var gbH = baseY - gbTop;
      svg += '<rect x="' + (gx + gap).toFixed(1) + '" y="' + gbTop.toFixed(1) + '" width="' + barW.toFixed(1) + '" height="' + gbH.toFixed(1) + '" fill="none" stroke="' + COL_GHOST + '" stroke-width="1.5" rx="2"/>';
    }

    if (currentRev[b] > 0) {
      var cbTop = revY(currentRev[b]);
      var cbH = baseY - cbTop;
      svg += '<rect x="' + (gx + gap + barW + gap).toFixed(1) + '" y="' + cbTop.toFixed(1) + '" width="' + barW.toFixed(1) + '" height="' + cbH.toFixed(1) + '" fill="' + barColor + '" rx="2"/>';
    }

    /* X-axis label — month name only at first of month */
    if (sliced[b].isFirstOfMonth) {
      svg += '<text x="' + (gx + groupW / 2).toFixed(1) + '" y="' + (CHART_HEIGHT - 10) + '" text-anchor="middle" fill="' + COL_LABEL + '" font-size="11">' + sliced[b].monthName + '</text>';
    }

    /* Transparent hitbox for hover tooltip */
    svg += '<rect x="' + gx.toFixed(1) + '" y="' + PAD_T + '" width="' + groupW.toFixed(1) + '" height="' + PLOT_H + '" fill="transparent" style="cursor:default" onmouseover="showChartTooltip(event,' + b + ')" onmouseout="hideChartTooltip()"/>';
  }

  /* ADR line */
  if (activeAdr) {
    var adrLinePts = [];
    for (var d = 0; d < n; d++) {
      if (adrPoints[d] !== null) {
        adrLinePts.push({ x: PAD_L + d * groupW + groupW / 2, y: adrY(adrPoints[d]) });
      }
    }
    if (adrLinePts.length > 1) {
      var pathD = 'M ' + adrLinePts[0].x.toFixed(1) + ' ' + adrLinePts[0].y.toFixed(1);
      for (var p = 1; p < adrLinePts.length; p++) {
        pathD += ' L ' + adrLinePts[p].x.toFixed(1) + ' ' + adrLinePts[p].y.toFixed(1);
      }
      svg += '<path d="' + pathD + '" fill="none" stroke="' + COL_ADR + '" stroke-width="1.5" stroke-dasharray="4,3" pointer-events="none"/>';
    }
    /* Dots only for small datasets (weekly ≤ 24 points) */
    if (n <= 24) {
      for (var q = 0; q < adrLinePts.length; q++) {
        svg += '<circle cx="' + adrLinePts[q].x.toFixed(1) + '" cy="' + adrLinePts[q].y.toFixed(1) + '" r="3.5" fill="' + COL_ADR + '" stroke="white" stroke-width="1.5" pointer-events="none"/>';
      }
    }
  }

  svg += '</svg>';
  document.getElementById('hero-chart').innerHTML = svg;

  /* Sync ADR legend visibility */
  var legendAdr = document.getElementById('legend-adr');
  if (legendAdr) legendAdr.style.display = activeAdr ? '' : 'none';
}

/* ── Day Row Toggle ─────────────────────────────────────── */
function toggleDay(monthKey) {
  var rows = document.querySelectorAll('.day-expand-row[data-month="' + monthKey + '"]');
  var monthRow = document.querySelector('.month-row[data-month-key="' + monthKey + '"]');
  for (var i = 0; i < rows.length; i++) {
    rows[i].classList.toggle('visible');
  }
  if (monthRow) monthRow.classList.toggle('month-expanded');
}

/* ── Chart Tooltip ──────────────────────────────────────── */
function showChartTooltip(event, idx) {
  var d = chartTooltipData[idx];
  if (!d) return;
  var modeLabels = { 'stly': 'STLY', 'wow': 'WoW', 'budget': 'Budget' };
  var modeLabel = modeLabels[activeMode] || '';
  var lines = '<div class="tt-label">' + d.label + '</div>';
  lines += '<div>Revenue OTB: ' + fmtMoney(d.currentRev) + '</div>';
  if (d.compRev !== null) {
    lines += '<div>' + modeLabel + ': ' + fmtMoney(d.compRev) + '</div>';
    var diff = d.currentRev - d.compRev;
    var pct = d.compRev > 0 ? diff / d.compRev * 100 : null;
    var sign = diff >= 0 ? '+' : '\u2212';
    var diffStr = sign + '$' + Math.round(Math.abs(diff)).toLocaleString('en-US');
    var pctStr = pct !== null ? ' (' + sign + Math.abs(pct).toFixed(1) + '%)' : '';
    var deltaColor = diff >= 0 ? '#b8e8c8' : '#f5b0b0';
    lines += '<div style="color:' + deltaColor + '">' + diffStr + pctStr + '</div>';
  }
  if (d.currentAdr !== null) {
    lines += '<div style="margin-top:4px;border-top:1px solid rgba(255,255,255,0.15);padding-top:4px">ADR: ' + fmtMoney(d.currentAdr) + '</div>';
  }
  if (d.currentOcc !== null) {
    lines += '<div>Occ: ' + fmtPct(d.currentOcc) + '</div>';
  }
  var el = document.getElementById('chart-tooltip');
  el.innerHTML = lines;
  el.style.display = 'block';
  el.style.left = (event.clientX + 14) + 'px';
  el.style.top = (event.clientY - 10) + 'px';
}

function hideChartTooltip() {
  var el = document.getElementById('chart-tooltip');
  if (el) el.style.display = 'none';
}

/* ── ADR Toggle ─────────────────────────────────────────── */
function setAdr() {
  activeAdr = !activeAdr;
  render();
}

function updateAdrPill() {
  var pill = document.getElementById('adr-pill');
  if (!pill) return;
  if (activeAdr) { pill.classList.add('active'); } else { pill.classList.remove('active'); }
}

/* ── Comparison Column Headers ──────────────────────────── */
function updateComparisonHeaders() {
  var modeLabels = { 'stly': 'vs STLY', 'wow': 'vs WoW', 'budget': 'vs Budget' };
  var label = (activeMode && modeLabels[activeMode]) ? modeLabels[activeMode] : 'vs \u2014';
  var ids = ['th-rev-comp', 'th-adr-comp', 'th-occ-comp'];
  for (var i = 0; i < ids.length; i++) {
    var el = document.getElementById(ids[i]);
    if (el) el.textContent = label;
  }
}

/* ── Actions ────────────────────────────────────────────── */
function setCompare(mode) {
  if (!DATA.modes[mode]) return;
  activeMode = mode;
  render();
}

function setOoo(mode) {
  activeOoo = mode;
  render();
}

function setChartFilter(n) {
  activeChartFilter = n;
  render();
}

/* ── Master Render ──────────────────────────────────────── */
function getFilteredMonthly() {
  var data = getActiveData();
  var monthly = data.monthly || [];
  if (activeChartFilter >= monthly.length) return monthly;
  return monthly.slice(0, activeChartFilter);
}

function render() {
  var data = getActiveData();
  var filteredMonthly = getFilteredMonthly();
  /* KPI banner aggregates from filtered slice */
  var kpi = aggregateKpiFromMonthly(filteredMonthly);
  renderKpiBanner(kpi);
  renderMonthlyTable(data.monthly);
  renderHeroChart(activeChartFilter);
  updateComparisonPills();
  updateOooToggle();
  updateChartFilter();
  updateAdrPill();
  updateComparisonHeaders();
  updateFootnotes();
  /* Window label reflects filter */
  if (filteredMonthly.length > 0) {
    var first = filteredMonthly[0].label;
    var last = filteredMonthly[filteredMonthly.length - 1].label;
    document.getElementById('window-label').textContent = first + ' \u2013 ' + last;
  }
  /* Footer */
  var footerLeft = document.getElementById('footer-left');
  var footerRight = document.getElementById('footer-right');
  if (footerLeft) footerLeft.textContent = 'Confidential \u2014 Prepared for ' + DATA.hotel.name;
  if (footerRight) footerRight.textContent = 'Generated ' + DATA.snapshot_date + ' \u00b7 Lights On Digital';
}

/* ── Init ───────────────────────────────────────────────── */
render();
</script>
